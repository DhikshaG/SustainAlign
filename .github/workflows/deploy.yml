name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        options:
          - production
          - staging
        default: staging
      skip_migrations:
        description: Skip database migrations
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{
    (github.event_name == 'workflow_dispatch' && inputs.environment) ||
    'production' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to ${{
      (github.event_name == 'workflow_dispatch' && inputs.environment) ||
      'production' }}
    runs-on: ubuntu-latest
    environment: ${{
      (github.event_name == 'workflow_dispatch' && inputs.environment) ||
      'production' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "secrets_configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Deploy secrets not configured — skipping deployment"
          else
            echo "secrets_configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SSH key
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS || '' }}

      - name: Deploy via SSH
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: |
          MIGRATE_FLAG=""
          if [ "${{ inputs.skip_migrations }}" = "true" ]; then
            MIGRATE_FLAG="--skip-migrate"
          fi
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash -s" \
            -- \
            "$MIGRATE_FLAG" \
            --remote "${{ secrets.DEPLOY_PATH }}"

      - name: Health check
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: |
          echo "Waiting for service to be healthy..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://${{ secrets.DEPLOY_HOST }}:3001/api/health > /dev/null 2>&1; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i/12..."
          done
          echo "❌ Health check failed"
          exit 1
