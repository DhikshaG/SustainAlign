name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        options:
          - production
          - staging
        default: staging
      skip_migrations:
        description: Skip database migrations
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment || 'production' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "secrets_configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  Deploy secrets not configured — skipping deployment"
          else
            echo "secrets_configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Install SSH key
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS || '' }}

      - name: Deploy via SSH
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: |
          MIGRATE_FLAG=""
          if [ "${{ inputs.skip_migrations }}" = "true" ]; then
            MIGRATE_FLAG="--skip-migrate"
          fi

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash -s" < scripts/deploy.sh \
            $MIGRATE_FLAG \
            --remote

      - name: Health check
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: |
          echo "Waiting for service to be healthy..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://${{ secrets.DEPLOY_HOST }}:3001/api/health > /dev/null 2>&1; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i/12..."
          done
          echo "❌ Health check failed"
          exit 1

  notify-failure:
    name: Notify on deploy failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const message = `## 🚨 CD Deployment Failed

            **Branch:** \`${{ github.ref_name }}\`
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.triggering_actor }}
            **Environment:** ${{ inputs.environment || 'production' }}
            **Run:** [View logs](${runUrl})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CD] Deployment failure on ${context.refName}`,
              body: message,
              labels: ['cd-failure'],
            });
