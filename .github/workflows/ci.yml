name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  NODE_ENV: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint --workspace frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build --workspace frontend
        env:
          VITE_API_BASE_URL: /api

  test-backend:
    name: Test (backend SQLite)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run backend tests with coverage
        run: npm test --workspace backend -- --coverage
        env:
          DATABASE_PATH: ./data/test.db
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-characters

  test-backend-pg:
    name: Test (backend Postgres)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sustainalign_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run backend tests (Postgres)
        run: npm test --workspace backend
        env:
          DB_DIALECT: pg
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sustainalign_test
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-characters

  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests with coverage
        run: npm test --workspace frontend -- --coverage
