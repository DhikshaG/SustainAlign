---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system dependencies
  apt:
    name:
      - curl
      - git
      - unzip
      - htop
      - ufw
      - fail2ban
      - unattended-upgrades
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - rsync
      - age
    state: present

- name: Add Node.js {{ node_version }} apt key
  apt_key:
    url: 'https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key'
    state: present

- name: Add Node.js {{ node_version }} repository
  apt_repository:
    repo: 'deb https://deb.nodesource.com/node_{{ node_version }} nodistro main'
    state: present

- name: Install Node.js
  apt:
    name: nodejs
    state: present

- name: Add Docker GPG key
  apt_key:
    url: 'https://download.docker.com/linux/ubuntu/gpg'
    state: present

- name: Add Docker repository
  apt_repository:
    repo: 'deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable'
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Install Docker Compose standalone
  get_url:
    url: 'https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64'
    dest: /usr/local/bin/docker-compose
    mode: '0755'

- name: Create deploy user
  user:
    name: '{{ deploy_user }}'
    state: present
    shell: /bin/bash
    groups: docker
    append: yes

- name: Add deploy SSH key
  authorized_key:
    user: '{{ deploy_user }}'
    key: "{{ lookup('file', '~/.ssh/{{ deploy_user }}.pub') }}"
    state: present

- name: Create app directory
  file:
    path: '{{ app_directory }}'
    state: directory
    owner: '{{ deploy_user }}'
    group: '{{ deploy_user }}'
    mode: '0755'

- name: Configure unattended-upgrades
  dpkg_selections:
    name: unattended-upgrades
    selection: install
