user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log notice;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Basic hardening ─────────────────────────────────────
  server_tokens off;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # ── Rate limiting zones ──────────────────────────────────
  limit_req_zone  $binary_remote_addr  zone=api:10m  rate=60r/m;
  limit_req_zone  $binary_remote_addr  zone=login:10m rate=10r/m;
  limit_req_zone  $binary_remote_addr  zone=static:10m rate=300r/m;
  limit_conn_zone $binary_remote_addr  zone=conn:10m  max=30;

  # ── Logging ──────────────────────────────────────────────
  log_format json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes":$body_bytes_sent,'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"request_time":$request_time,'
    '"upstream_addr":"$upstream_addr"'
  '}';

  access_log /var/log/nginx/access.log json buffer=32k flush=5s;

  # ── Compression ──────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/manifest+json
    image/svg+xml;

  # ── SSL (global) ─────────────────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  # ── Security headers (default) ───────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  include /etc/nginx/conf.d/*.conf;
}
