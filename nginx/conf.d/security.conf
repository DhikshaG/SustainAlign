# ── Security headers (applied in nginx.conf, reinforced here) ──
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy "
  default-src 'self';
  script-src 'self';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data:;
  font-src 'self';
  connect-src 'self';
  frame-ancestors 'none';
  form-action 'self';
  base-uri 'self';
" always;

# ── Block malicious user agents ──────────────────────────
map $http_user_agent $bad_bot {
  default 0;
  ~*(curl|wget|python-requests|go-http-client|scrapy|nikto|sqlmap) 1;
}

# ── Block common attack patterns ─────────────────────────
map $request_uri $is_attack {
  default 0;
  ~*(\.\.//|\.env|wp-admin|wp-includes|xmlrpc) 1;
  ~*(eval\(|union.*select|exec\(|system\(|passthru\() 1;
}

location /api/ {
  if ($bad_bot) { return 403; }
  if ($is_attack) { return 403; }

  limit_except GET POST PUT PATCH DELETE OPTIONS HEAD {
    deny all;
  }
}

# ── Limit HTTP methods ───────────────────────────────────
if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
  return 405;
}

# ── Deny access to hidden files ──────────────────────────
location ~ /\.(?!well-known) {
  deny all;
  access_log off;
  log_not_found off;
}

# ── Deny access to sensitive paths ───────────────────────
location ~* (node_modules|\.git|\.env|\.sqlite|storage/logs) {
  deny all;
  access_log off;
  log_not_found off;
}
