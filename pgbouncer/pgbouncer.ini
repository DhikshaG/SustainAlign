[databases]
sustainalign = host=postgres port=5432 dbname=sustainalign

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Session pooling — compatible with Drizzle/node-postgres prepared statements
pool_mode = session
default_pool_size = 25
max_client_conn = 100
max_db_connections = 50

# Resource limits
query_timeout = 30
idle_transaction_timeout = 300
server_idle_timeout = 600

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

# Security
client_tls_sslmode = disable
server_tls_sslmode = disable
ignore_startup_parameters = extra_float_digits
